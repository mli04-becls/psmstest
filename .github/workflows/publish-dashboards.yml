name: Publish Dashboards (MkDocs)

on:
  push:
    branches: [ main ]
    paths:
      - 'dashboards/site/**'
      - 'dashboards/data/**'
      - '.github/workflows/publish-dashboards.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tree
        run: |
          echo "== dashboards/site/docs =="
          ls -R dashboards/site/docs || true
          echo "== dashboards/data =="
          ls -R dashboards/data || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs + Material
        run: |
          pip install mkdocs mkdocs-material

      # 关键修改：强制创建 data 目录并复制
      - name: Copy data into docs/data
        run: |
          mkdir -p dashboards/site/docs/data
          cp -r dashboards/data/* dashboards/site/docs/data/ 2>/dev/null || true
          echo "== after copy =="
          ls -R dashboards/site/docs/data || true

      - name: Build MkDocs site
        working-directory: dashboards/site
        run: |
          mkdocs build --strict --verbose
          echo "== built site directory =="
          ls -R site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboards/site/site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4