name: Publish Dashboards (MkDocs)

on:
  push:
    branches: [ main ]
    paths:
      - 'dashboards/site/**'
      - 'dashboards/data/**'
      - '.github/workflows/publish-dashboards.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo tree (top)
        run: |
          pwd
          ls -la
          echo "---- dashboards/site ----"
          ls -la dashboards/site || true
          echo "---- dashboards/site/docs ----"
          ls -la dashboards/site/docs || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs + Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
          mkdocs --version

      - name: Prepare data into docs/data
        run: |
          mkdir -p dashboards/site/docs/data
          if [ -d "dashboards/data" ]; then
            cp -r dashboards/data/* dashboards/site/docs/data/ || true
          fi
          ls -la dashboards/site/docs/data || true

      # 在站点目录内执行构建，MkDocs 默认输出到 ./site
      - name: Build site (inside dashboards/site)
        working-directory: dashboards/site
        run: |
          mkdocs build --strict --verbose
          echo "Built output:"
          ls -la site

      # 上传 dashboards/site/site 作为 Pages 工件
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboards/site/site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4